    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Inline styles from principal.html (Condensed) -->
    <style>
        {{CSS_BLOCK}}
    </style>

<body class="font-sans m-0 p-0">
    <header class="bg-white shadow-sm sticky top-0 z-30">
        <div class="container mx-auto px-4 h-16 flex justify-between items-center">
            <button class="text-gray-600 hover:text-gray-800"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg></button>
            <div class="absolute left-1/2 transform -translate-x-1/2"><a href="index.html"><img loading="lazy" decoding="async" src="images/logo-woovi.png" alt="Woovi Instituto" class="h-20 w-auto"></a></div>
            <button id="menu-toggle-button" class="text-gray-600 hover:text-gray-800"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden">
            <div class="px-4 pt-4 pb-3 space-y-1">
                <a href="#donation-section" class="block px-3 py-2 text-base font-medium text-gray-700 hover:text-green-500">Como ajudar</a>
                <div class="border-t border-gray-200 pt-4 pb-3"><a href="index.html" class="block w-full bg-[#25D366] text-white px-4 py-3 rounded-md font-semibold text-center">Outras campanhas</a></div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Coluna Esquerda: Conteúdo da Campanha -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Vídeo/Imagem Hero -->
                <div class="bg-black rounded-3xl overflow-hidden shadow-xl">
                    <div class="video-container relative w-full aspect-video bg-black">
                        <img loading="lazy" decoding="async" id="customVideo" src="{{IMAGE_URL}}" class="w-full h-full object-cover">
                    </div>
                </div>

                <!-- Título (Mobile only, above story) -->
                <div class="lg:hidden bg-white p-6 rounded-3xl shadow-sm">
                    <h1 id="campaign-title-mobile" class="text-2xl font-black text-[#1e293b] leading-tight">{{FULL_TITLE}}</h1>
                </div>

                <!-- Story Section -->
                <div class="bg-white rounded-3xl shadow-sm p-8">
                    <h2 class="text-3xl font-black text-[#1e293b] mb-6 hidden lg:block" id="campaign-title-desktop">{{FULL_TITLE}}</h2>
                    <div id="campaign-description" class="text-gray-700 text-lg leading-relaxed space-y-4">{{STORY_CONTENT}}</div>
                </div>

                <!-- Doações Section -->
                <div class="bg-white p-8 rounded-3xl shadow-sm">
                    <div class="flex items-center justify-between mb-8">
                        <h3 class="text-2xl font-black text-[#1e293b]">Doações <span id="donations-count-badge" class="ml-2 text-sm font-bold bg-gray-100 px-3 py-1 rounded-full text-gray-500">100</span></h3>
                    </div>
                    <div id="recent-donations-list" class="space-y-6">
                        <!-- Donors list injected here -->
                    </div>
                </div>
            </div>

            <!-- Coluna Direita: Sidebar Checkout -->
            <div class="lg:col-span-1">
                <div class="sticky top-24 space-y-6">
                    <!-- Card de Doação -->
                    <div class="bg-white rounded-3xl shadow-2xl border border-gray-100 p-8">
                        <!-- Progresso -->
                        <div class="mb-8">
                            <div class="flex items-baseline gap-2 mb-2">
                                <span id="value-raised-sidebar" class="text-3xl font-black text-[#1e293b]">€ 0</span>
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">angariados</span>
                            </div>
                            <div class="relative w-full h-3 bg-gray-100 rounded-full overflow-hidden mb-3">
                                <div id="progress-bar-sidebar" class="absolute top-0 left-0 h-full bg-[#4A9D44] transition-all duration-1000" style="width: 0%"></div>
                            </div>
                            <p class="text-xs font-bold text-gray-500 uppercase tracking-widest flex justify-between">
                                <span id="progress-percentage-sidebar">0% completo</span>
                                <span id="value-goal-sidebar">meta € 0</span>
                            </p>
                        </div>

                        <!-- Seleção de Valor -->
                        <div class="mb-8">
                            <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Escolha o valor da contribuição</label>
                            <div id="sidebar-value-grid" class="grid grid-cols-2 gap-3 mb-4">
                                <!-- Valores injetados (15, 20, 30, 50, 100, 200) -->
                            </div>
                            <!-- Outro Valor -->
                            <div id="sidebar-custom-amount-container" class="hidden animate-slide-up">
                                <div class="relative mt-2">
                                    <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-gray-400">€</span>
                                    <input type="number" id="sidebar-custom-amount" class="w-full pl-8 pr-4 py-3 border-2 border-[#4A9D44] rounded-xl font-bold text-[#1e293b] outline-none" placeholder="Valor">
                                </div>
                            </div>
                        </div>

                        <!-- Formulário de Checkout -->
                        <div class="space-y-4 mb-8">
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">O seu nome</label>
                                <input type="text" id="sidebar-payer-name" class="w-full px-4 py-3 bg-gray-50 border-2 border-transparent focus:border-[#4A9D44] focus:bg-white rounded-xl text-sm font-bold transition-all outline-none" placeholder="Escreva o seu nome">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Documento (NIF/CC)</label>
                                <input type="text" id="sidebar-nif" class="w-full px-4 py-3 bg-gray-50 border-2 border-transparent focus:border-[#4A9D44] focus:bg-white rounded-xl text-sm font-bold transition-all outline-none" placeholder="NIF ou CC">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5">Número de Telemóvel</label>
                                <div class="flex gap-2">
                                    <div class="flex items-center px-3 py-3 bg-gray-100 rounded-xl text-xs font-bold text-gray-500">🇵🇹 +351</div>
                                    <input type="text" id="sidebar-phone" class="flex-1 px-4 py-3 bg-gray-50 border-2 border-transparent focus:border-[#4A9D44] focus:bg-white rounded-xl text-sm font-bold transition-all outline-none" placeholder="912 345 678">
                                </div>
                            </div>
                        </div>

                        <!-- Método de Pagamento -->
                        <div class="mb-8">
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 text-center">Forma de Pagamento</label>
                            <div class="flex gap-4">
                                <button type="button" onclick="setSidebarMethod('mbway')" id="btn-sidebar-mbway" class="flex-1 flex flex-col items-center p-3 border-2 border-[#4A9D44] bg-[#f0fdf4] rounded-2xl transition-all">
                                    <img src="images/mbway2.png" class="h-5 mb-1">
                                    <span class="text-[9px] font-black text-[#4A9D44]">MB WAY</span>
                                </button>
                                <button type="button" onclick="setSidebarMethod('multibanco')" id="btn-sidebar-multibanco" class="flex-1 flex flex-col items-center p-3 border-2 border-gray-100 rounded-2xl opacity-60 hover:opacity-100 transition-all">
                                    <img src="images/multibanco.jpg" class="h-5 mb-1">
                                    <span class="text-[9px] font-black text-gray-400">MULTIBANCO</span>
                                </button>
                            </div>
                        </div>

                        <button type="button" onclick="generateSidebarDonation()" class="w-full bg-[#4A9D44] text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-green-200 hover:bg-[#3d8238] transition-all transform active:scale-95 flex items-center justify-center gap-3">
                            EFETUAR DOAÇÃO
                        </button>

                        <p class="text-[10px] text-center text-gray-400 mt-4 px-4 font-semibold uppercase tracking-widest">
                            🔒 Pagamento 100% seguro & protegido
                        </p>
                    </div>

                    <!-- Organizer Card -->
                    <div class="bg-gray-50 rounded-3xl p-6 flex items-center gap-4 border border-gray-100">
                        <img loading="lazy" decoding="async" id="organizer-avatar-sidebar" src="images/logo-woovi.png" class="w-12 h-12 rounded-full">
                        <div>
                            <p id="organizer-name-sidebar" class="font-black text-[#1e293b] text-sm">Woovi Instituto</p>
                            <p class="text-[10px] font-bold text-gray-400 uppercase">Organizador</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer, Modal, and Scripts same as principal.html -->
    {{FOOTER_AND_SCRIPTS_BLOCK}}

    <script>
        window.campaignData = {
            id: "{{ID}}",
            title: "{{FULL_TITLE}}",
            valueRaised: "{{VALUE_RAISED}}",
            valueGoal: "{{VALUE_GOAL}}",
            creator: { name: "{{ORGANIZER_NAME}}", avatarUrl: "{{ORGANIZER_AVATAR}}" },
            donorsForNotifications: {{DONORS_JSON}}
        };
    </script>
    {{CONSOLIDATED_SCRIPT}}


</body></html>
